<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Main gradient: deep navy to bright cyan -->
    <linearGradient id="grad-main" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7DD8FF"/>
      <stop offset="45%"  stop-color="#3AAEE8"/>
      <stop offset="100%" stop-color="#1A6EC8"/>
    </linearGradient>
    <!-- Inner face gradient -->
    <linearGradient id="grad-face" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#C8F0FF"/>
      <stop offset="100%" stop-color="#4DC8F0"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background circle — dark navy -->
  <circle cx="256" cy="256" r="256" fill="#070B1A"/>

  <!-- Subtle inner ring -->
  <circle cx="256" cy="256" r="228" fill="none" stroke="rgba(77,200,240,.07)" stroke-width="1.5"/>
  <circle cx="256" cy="256" r="200" fill="none" stroke="rgba(77,200,240,.05)" stroke-width="1"/>

  <!-- ── The N mark ── -->
  <!-- Built from 3 thick bars: left vertical, diagonal, right vertical -->
  <!-- Left vertical bar -->
  <rect x="108" y="138" width="72" height="236" rx="18" fill="url(#grad-main)" filter="url(#glow)"/>
  <!-- Right vertical bar -->
  <rect x="332" y="138" width="72" height="236" rx="18" fill="url(#grad-main)" filter="url(#glow)"/>
  <!-- Diagonal bar — rotated rectangle connecting top-left to bottom-right -->
  <polygon
    points="144,138 216,138 368,374 296,374"
    fill="url(#grad-main)"
    filter="url(#glow)"
  />

  <!-- Top-left corner accent dot -->
  <circle cx="144" cy="138" r="20" fill="#7DD8FF" filter="url(#glow-sm)"/>
  <!-- Bottom-right corner accent dot -->
  <circle cx="368" cy="374" r="20" fill="#7DD8FF" filter="url(#glow-sm)"/>

  <!-- Bright highlight line on left bar -->
  <rect x="108" y="138" width="18" height="236" rx="9" fill="rgba(200,240,255,.35)"/>
  <!-- Bright highlight line on right bar -->
  <rect x="332" y="138" width="18" height="140" rx="9" fill="rgba(200,240,255,.25)"/>

  <!-- Neutron particle — orbiting dot top right -->
  <circle cx="388" cy="124" r="22" fill="#0A1830"/>
  <circle cx="388" cy="124" r="16" fill="none" stroke="rgba(77,200,240,.3)" stroke-width="2"/>
  <circle cx="388" cy="124" r="9"  fill="#4DC8F0" filter="url(#glow-sm)"/>
  <circle cx="384" cy="120" r="3"  fill="#C8F0FF"/>

  <!-- Outer glow ring hint at bottom -->
  <circle cx="256" cy="256" r="246" fill="none" stroke="url(#grad-main)" stroke-width="2" opacity=".12"/>
</svg>
